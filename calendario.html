<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendario de partidos</title>
    <link rel="stylesheet" href="calendario.css" />
  </head>

  <body>
    <main class="calendar-page">
      <header class="page-header">
        <nav class="page-nav" aria-label="Navegaci&oacute;n del calendario">
          <a href="index.html">Volver</a>
          <a class="prediction-button" href="porra.html">Hacer predicci&oacute;n</a>
        </nav>
        <h1>Calendario</h1>
      </header>

      <section class="calendar-tools" aria-label="Filtros del calendario">
        <div class="field">
          <label for="group-filter">Fase o grupo</label>
          <select id="group-filter">
            <option value="">Todas las fases</option>
          </select>
        </div>

        <div class="field">
          <label for="team-filter">Buscar equipo</label>
          <input id="team-filter" type="text" placeholder="España" />
        </div>
      </section>

      <div class="calendar-summary" id="calendar-summary">
        Cargando partidos...
      </div>

      <div class="calendar-list" id="calendar-list"></div>
    </main>

    <script>
      const API_URL =
        "https://script.google.com/macros/s/AKfycbxg7uSYAwe_g42SN__C0n8K-5xWTjtm4qDKs1zm1aBK-Q2EGOBPdV-I1j4TRrtc5Yaffw/exec";

      let matches = [];

      const groupFilter = document.getElementById("group-filter");
      const teamFilter = document.getElementById("team-filter");
      const list = document.getElementById("calendar-list");
      const summary = document.getElementById("calendar-summary");

      const flags = {
        Alemania: "Alemania_48x48.png",
        "Arabia Saudita": "Arabia_Saudita_48x48.png",
        Argelia: "Argelia_48x48.png",
        Argentina: "Argentina_48x48.png",
        Australia: "Australia_48x48.png",
        Austria: "Austria_48x48.png",
        Belgica: "Belgica_48x48.png",
        "Bosnia y Herzegovina": "Bosnia_Herzegovina_48x48.png",
        Brasil: "Brasil_48x48.png",
        "Cabo Verde": "Cabo_Verde_48x48.png",
        Canada: "Canada_48x48.png",
        Catar: "Catar_48x48.png",
        Chequia: "Chequia_48x48.png",
        Colombia: "Colombia_48x48.png",
        "Corea del Sur": "Corea_Sur_48x48.png",
        "Costa de Marfil": "Costa_Marfil_48x48.png",
        Croacia: "Croacia_48x48.png",
        Curazao: "Curazao_48x48.png",
        Ecuador: "Ecuador_48x48.png",
        Egipto: "Egipto_48x48.png",
        Escocia: "Escocia_48x48.png",
        Espana: "España_48x48.png",
        "Estados Unidos": "Estados_Unidos_48x48.png",
        Francia: "Francia_48x48.png",
        Ghana: "Ghana_48x48.png",
        Haiti: "Haití_48x48.png",
        Inglaterra: "Inglaterra_48x48.png",
        Irak: "Irak_48x48.png",
        Iran: "Iran_48x48.png",
        Japon: "Japon_48x48.png",
        Jordania: "Jordania_48x48.png",
        Marruecos: "Marruecos_48x48.png",
        Mexico: "Mexico_48x48.png",
        Noruega: "Noruega_48x48.png",
        "Nueva Zelanda": "Nueva_Zelanda_48x48.png",
        "Paises Bajos": "Paises_Bajos_48x48.png",
        Panama: "Panama_48x48.png",
        Paraguay: "Paraguay_48x48.png",
        Portugal: "Portugal_48x48.png",
        "RD Congo": "RD_Congo_48x48.png",
        Senegal: "Senegal_48x48.png",
        Sudafrica: "Sudafrica_48x48.png",
        Suecia: "Suecia_48x48.png",
        Suiza: "Suiza_48x48.png",
        Tunez: "Tunez_48x48.png",
        Turquia: "Turquia_48x48.png",
        Uruguay: "Uruguay_48x48.png",
        Uzbekistan: "Uzbekistan_48x48.png",
        "Por definir": "None_48x48.png",
      };

      function normalize(text) {
        return String(text)
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");
      }

      function hasResult(match) {
        return match.golesLocal !== "" && match.golesVisitante !== "";
      }

      function getScore(match) {
        if (!hasResult(match)) {
          return '<span class="match-status">Pendiente</span>';
        }

        return `<strong class="match-score">${match.golesLocal} - ${match.golesVisitante}</strong>`;
      }

      function getTeam(team, side) {
        const flag = flags[team];
        const flagImage = flag
          ? `<img class="match-flag" src="images/${flag}" alt="" />`
          : "";

        return `
          <span class="match-team match-team-${side}">
            ${side === "home" ? flagImage : ""}
            <span>${team}</span>
            ${side === "away" ? flagImage : ""}
          </span>
        `;
      }

      function render() {
        const selectedGroup = groupFilter.value;
        const search = normalize(teamFilter.value.trim());

        const filteredMatches = matches.filter((match) => {
          const sameGroup = !selectedGroup || match.grupo === selectedGroup;
          const teams = normalize(`${match.local} ${match.visitante}`);

          return sameGroup && (!search || teams.includes(search));
        });

        summary.textContent = `${filteredMatches.length} partidos encontrados`;
        list.innerHTML = "";

        if (filteredMatches.length === 0) {
          list.innerHTML = "<p>No hay partidos con esos filtros.</p>";
          return;
        }

        const groupedByDate = filteredMatches.reduce((dates, match) => {
          if (!dates.has(match.fecha)) {
            dates.set(match.fecha, []);
          }

          dates.get(match.fecha).push(match);
          return dates;
        }, new Map());

        groupedByDate.forEach((dateMatches, date) => {
          const section = document.createElement("section");
          section.className = "calendar-day";
          section.innerHTML = `<h2>${date}</h2>`;

          dateMatches.forEach((match) => {
            section.insertAdjacentHTML(
              "beforeend",
              `
                <article class="match-card">
                  <div class="match-meta">
                    <span>${match.grupo}</span>
                    <span>${match.hora}</span>
                  </div>

                  <div class="match-teams">
                    ${getTeam(match.local, "home")}
                    ${getScore(match)}
                    ${getTeam(match.visitante, "away")}
                  </div>
                </article>
              `,
            );
          });

          list.append(section);
        });
      }

      function loadGroups() {
        groupFilter.innerHTML = '<option value="">Todas las fases</option>';

        [...new Set(matches.map((match) => match.grupo))].forEach((group) => {
          const option = document.createElement("option");
          option.value = group;
          option.textContent = group;
          groupFilter.append(option);
        });
      }

      async function loadCalendar() {
        try {
          const response = await fetch(API_URL);
          const data = await response.json();

          matches = data.partidos || [];

          loadGroups();
          render();
        } catch (error) {
          console.error(error);
          summary.textContent = "No se ha podido cargar el calendario.";
        }
      }

      groupFilter.addEventListener("change", render);
      teamFilter.addEventListener("input", render);

      loadCalendar();
    </script>
  </body>
</html>
